<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC HGF</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="logo.png" class="team-logo" alt="Logo đội bóng">
    <img src="hinhnen.jpg" class="full-screen-bg" alt="Background">

    <div class="container">
        <header>
            <h1>📸HGF - Kỷ Niệm Của Chúng Ta</h1>
            <button id="btnOpen" class="btn-add">➕ Tạo Album Mới</button>
            <button type="submit" class="btn-save" id="saveBtn">Lưu Album</button>
        </header>

        <div id="memoryList" class="grid-container">
            </div>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Tạo Album Mới</h2>
            <form id="memoryForm">
                <div class="form-group">
                    <label>Ngày kỷ niệm:</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label>Tên Album:</label>
                    <input type="text" id="content" placeholder="Ví dụ: Sinh nhật bé Bảo An" required>
                </div>
                <div class="form-group">
                    <label>Người đăng:</label>
                    <input type="text" id="author" placeholder="Tên của bạn" required>
                </div>
                <div class="form-group">
                    <label>Chọn các ảnh:</label>
                    <input type="file" id="imageInput" accept="image/*" multiple required>
                </div>
                <button type="submit" class="btn-save">Lưu Album</button>
            </form>
        </div>
    </div>

    <div id="albumOverlay" class="album-overlay" style="display:none;">
        <span class="close-album" onclick="closeAlbum()">&times;</span>
        <h2 id="albumTitle" style="color:white; text-align:center; margin-bottom:20px;"></h2>
        <div id="albumGrid"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
